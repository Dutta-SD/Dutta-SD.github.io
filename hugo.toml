baseURL = "https://dutta-sd.github.io/"
languageCode = "en-us"
title = "Sandip Dutta"
theme = "PaperMod"

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

pygmentsUseClasses = true

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = "production"
  title = "Sandip Dutta"
  description = "Personal site of Sandip Dutta — Software Development Engineer at Amazon. Backend, ML infrastructure, AI agents, and the occasional distributed-systems rabbit hole."
  keywords = ["Sandip Dutta", "SDE", "Amazon", "Distributed Systems", "Machine Learning", "Backend Engineering"]
  author = "Sandip Dutta"
  DateFormat = "2006-01-02"
  defaultTheme = "dark"
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = false
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = false
  tocopen = false

  [params.profileMode]
    enabled = true
    title = "Sandip Dutta"
    subtitle = "Software Development Engineer at Amazon. I build backend systems, ML infrastructure, and AI agents. Before Amazon, I was a Research Software Engineer at IIT Kharagpur's VIP Lab."
    imageUrl = "/img/prof_pic.jpg"
    imageWidth = 140
    imageHeight = 140
    imageTitle = "Sandip Dutta"
    buttons = [
      { name = "Experience", url = "/experience/" },
      { name = "Projects", url = "/projects/" },
      { name = "Publications", url = "/publications/" },
      { name = "Blog", url = "/posts/" },
      { name = "CV", url = "/cv/cv_sandipdutta.pdf" },
    ]

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/Dutta-SD"
  [[params.socialIcons]]
    name = "linkedin"
    url = "https://linkedin.com/in/dutta-sd"
  [[params.socialIcons]]
    name = "googlescholar"
    url = "https://scholar.google.com/citations?user=ZgBCreQAAAAJ&hl=en"
  [[params.socialIcons]]
    name = "email"
    url = "mailto:sandip28dutta@gmail.com"
  [[params.socialIcons]]
    name = "cv"
    url = "/cv/cv_sandipdutta.pdf"

  [params.assets]
    disableHLJS = false
    disableFingerprinting = false
    favicon = "/favicon.ico"

  [params.label]
    text = "Sandip Dutta"

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

[menu]
  [[menu.main]]
    identifier = "home"
    name = "Home"
    url = "/"
    weight = 5
  [[menu.main]]
    identifier = "experience"
    name = "Experience"
    url = "/experience/"
    weight = 10
  [[menu.main]]
    identifier = "projects"
    name = "Projects"
    url = "/projects/"
    weight = 20
  [[menu.main]]
    identifier = "publications"
    name = "Publications"
    url = "/publications/"
    weight = 30
  [[menu.main]]
    identifier = "posts"
    name = "Blog"
    url = "/posts/"
    weight = 40
  [[menu.main]]
    identifier = "cv"
    name = "CV"
    url = "/cv/cv_sandipdutta.pdf"
    weight = 50
  [[menu.main]]
    identifier = "search"
    name = "Search"
    url = "/search/"
    weight = 60

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.highlight]
    noClasses = false
    codeFences = true
    guessSyntax = true
    lineNos = false
    style = "monokai"
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions.passthrough]
      enable = true
      [markup.goldmark.extensions.passthrough.delimiters]
        block = [['\[', '\]'], ['$$', '$$']]
        inline = [['\(', '\)']]
